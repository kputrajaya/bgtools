<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Prompts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="container p-3 py-0">
    <h1 class="my-5 fs-2 text-center">Pick a Game!</h1>
    <div id="categoryBtns" class="d-flex flex-column gap-3">
      <!-- Dynamic Buttons -->
    </div>

    <div class="modal fade" id="promptModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-fullscreen">
        <div class="modal-content bg-secondary-subtle">
          <div class="modal-header border-0 pb-0">
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div id="promptText" class="modal-body p-4 fs-3 d-flex justify-content-center align-items-center">
            <!-- Prompt Text -->
          </div>
          <div class="modal-footer bg-white">
            <button id="promptNextBtn" type="button" class="btn btn-lg btn-primary">Next</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="site.js"></script>
  </body>
</html>
